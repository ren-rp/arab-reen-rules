<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — الصفحة غير موجودة | عرب رين</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: #0a0a12;
    color: #f5f1e8;
    min-height: 100vh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 24px;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(138, 101, 32, 0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(192, 57, 43, 0.12) 0%, transparent 50%);
  }
  .four-oh-four {
    font-family: 'Reem Kufi', sans-serif;
    font-size: clamp(120px, 25vw, 220px);
    font-weight: 700;
    color: transparent;
    -webkit-text-stroke: 2px #d4a44b;
    line-height: 0.9;
    letter-spacing: -8px;
    margin-bottom: 24px;
  }
  h1 {
    font-family: 'Reem Kufi', sans-serif;
    font-size: clamp(28px, 5vw, 42px);
    margin-bottom: 16px;
  }
  p {
    color: #c8c2b3;
    font-size: 17px;
    max-width: 480px;
    margin: 0 auto 36px;
    line-height: 1.7;
  }
  a {
    display: inline-block;
    padding: 14px 32px;
    background: #d4a44b;
    color: #0a0a12;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 700;
    font-size: 15px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(212, 164, 75, 0.3);
  }
  a:hover {
    background: #f0c264;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(212, 164, 75, 0.5);
  }
</style>
</head>
<body>
  <div>
    <div class="four-oh-four">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>الصفحة اللي تدور عليها مو موجودة، أو ربما تم نقلها لمكان آخر. ارجع للصفحة الرئيسية واستكشف القوانين.</p>
    <a href="./">العودة للصفحة الرئيسية</a>
  </div>
</body>
</html>
